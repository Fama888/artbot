<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Каталог</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      margin: 0;
      padding: 10px;
    }

    .card {
      background: #222;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      color: lime;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<h2>🛍 Каталог</h2>

<div class="card">
  <img src="https://via.placeholder.com/300">
  <h3>Товар 1</h3>
  <div class="price">100 ₽</div>
</div>

<div class="card">
  <img src="https://via.placeholder.com/300">
  <h3>Товар 2</h3>
  <div class="price">150 ₽</div>
</div>

</body>
</html>
