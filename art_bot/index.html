<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Каталог</title>
<style>

body {
  margin:0;
  font-family: Arial;
  background:#0f0f0f;
  color:white;
}

/* верх меню */
.top {
  display:flex;
  justify-content:space-around;
  padding:10px;
  background:#1c1c1c;
  position:sticky;
  top:0;
}

.tab {
  padding:8px 15px;
  border-radius:10px;
  background:#2a2a2a;
  cursor:pointer;
}

.active {
  background:#ffcc00;
  color:black;
}

/* сетка */
.grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
  padding:10px;
}

.card {
  background:#1c1c1c;
  border-radius:15px;
  overflow:hidden;
}

.card img {
  width:100%;
  height:140px;
  object-fit:cover;
}

.info {
  padding:10px;
}

.price {
  color:#00ff88;
  margin-top:5px;
}

.hidden {
  display:none;
}

</style>
</head>

<body>

<div class="top">
  <div class="tab active" onclick="show('photo')">Фото</div>
  <div class="tab" onclick="show('video')">Видео</div>
</div>

<!-- PHOTO -->
<div id="photo" class="grid">

  <div class="card">
    <img src="https://via.placeholder.com/300">
    <div class="info">
      <div>Фото 1</div>
      <div class="price">100 ₽</div>
    </div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300">
    <div class="info">
      <div>Фото 2</div>
      <div class="price">150 ₽</div>
    </div>
  </div>

</div>

<!-- VIDEO -->
<div id="video" class="grid hidden">

  <div class="card">
    <img src="https://via.placeholder.com/300/0000FF">
    <div class="info">
      <div>Видео 1</div>
      <div class="price">200 ₽</div>
    </div>
  </div>

</div>

<script>
function show(tab){
  document.getElementById("photo").classList.add("hidden");
  document.getElementById("video").classList.add("hidden");

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

  if(tab === "photo"){
    document.getElementById("photo").classList.remove("hidden");
    document.querySelectorAll(".tab")[0].classList.add("active");
  } else {
    document.getElementById("video").classList.remove("hidden");
    document.querySelectorAll(".tab")[1].classList.add("active");
  }
}
</script>

</body>
</html>
